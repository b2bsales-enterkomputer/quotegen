<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EK Quotation Generator</title>

<!-- Supabase client -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<!-- jsPDF + autotable, untuk export PDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<!-- docx.js, untuk export DOCX -->
<script src="https://unpkg.com/docx@8.5.0/build/index.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

<style>
  :root{
    --bg:#0f1117; --panel:#1a1d27; --border:#2a2d3a;
    --green:#00c853; --gdim:#132a1c; --yellow:#ffd600;
    --red:#ff3d3d; --text:#e8eaf0; --tdim:#6b7280; --hdr:#141720;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; background:var(--bg); color:var(--text);
    font-family:'Segoe UI',Arial,sans-serif; font-size:14px;
  }
  header{
    padding:16px 24px; background:var(--hdr); border-bottom:1px solid var(--border);
    display:flex; align-items:center; justify-content:space-between;
  }
  header h1{ font-size:17px; margin:0; font-weight:600; }
  header .badge{ font-size:11px; color:var(--tdim); }
  .layout{
    display:grid; grid-template-columns:1.3fr 1fr; gap:16px;
    padding:20px; max-width:1300px; margin:0 auto;
  }
  @media (max-width: 900px){ .layout{ grid-template-columns:1fr; } }
  .panel{
    background:var(--panel); border:1px solid var(--border);
    border-radius:10px; padding:18px;
  }
  .panel h2{
    font-size:14px; text-transform:uppercase; letter-spacing:.05em;
    color:var(--tdim); margin:0 0 14px 0;
  }
  label{ display:block; font-size:12px; color:var(--tdim); margin-bottom:4px; }
  input, select{
    width:100%; padding:8px 10px; background:#0f1117; border:1px solid var(--border);
    border-radius:6px; color:var(--text); font-size:13px; margin-bottom:12px;
  }
  input:focus, select:focus{ outline:none; border-color:var(--green); }
  .row{ display:grid; grid-template-columns:1fr; gap:0 12px; }
  .row2{ display:grid; grid-template-columns:1fr 1fr; gap:0 12px; }
  .row4{ display:grid; grid-template-columns:2fr 0.7fr 1fr 0.4fr; gap:0 8px; align-items:start; }

  table{ width:100%; border-collapse:collapse; margin-bottom:10px; }
  th{ text-align:left; font-size:11px; color:var(--tdim); padding:6px 4px; border-bottom:1px solid var(--border); }
  td{ padding:6px 4px; border-bottom:1px solid var(--border); font-size:13px; }
  td input{ margin-bottom:0; padding:5px 6px; font-size:12px; }
  .del-btn{
    background:var(--red); border:none; color:#fff; border-radius:5px;
    width:24px; height:24px; cursor:pointer; font-size:13px; line-height:1;
  }
  .add-btn{
    background:var(--gdim); border:1px dashed var(--green); color:var(--green);
    padding:8px; border-radius:6px; width:100%; cursor:pointer; font-size:13px; margin-top:4px;
  }
  .totals{ margin-top:14px; border-top:1px solid var(--border); padding-top:10px; }
  .totals .line{ display:flex; justify-content:space-between; padding:3px 0; font-size:13px; }
  .totals .grand{ font-weight:700; font-size:15px; color:var(--green); border-top:1px solid var(--border); margin-top:6px; padding-top:8px; }

  .btn{
    padding:10px 14px; border:none; border-radius:7px; cursor:pointer;
    font-size:13px; font-weight:600; width:100%; margin-bottom:8px;
  }
  .btn-green{ background:var(--green); color:#04170a; }
  .btn-outline{ background:transparent; border:1px solid var(--green); color:var(--green); }
  .btn:disabled{ opacity:.5; cursor:not-allowed; }

  #status{ font-size:12px; margin-top:10px; min-height:16px; }
  .ok{ color:var(--green); } .err{ color:var(--red); } .warn{ color:var(--yellow); }

  .setup{
    max-width:1300px; margin:16px auto 0; padding:0 20px;
  }
  .setup details{
    background:var(--panel); border:1px solid var(--border); border-radius:8px; padding:10px 14px; font-size:12px; color:var(--tdim);
  }
  .setup summary{ cursor:pointer; color:var(--text); }
  .setup input{ margin-top:8px; }
</style>
</head>
<body>

<header>
  <h1>EK Quotation Generator</h1>
  <div style="display:flex; align-items:center; gap:14px;">
    <button class="btn btn-outline" style="width:auto; padding:7px 14px; margin:0;" onclick="openHistory()">📜 History</button>
    <span class="badge">Enterkomputer &middot; Formal Letter</span>
  </div>
</header>

<div class="setup">
  <details>
    <summary>⚙ Koneksi Supabase (isi sekali, tersimpan di browser ini)</summary>
    <label>Project URL</label>
    <input id="cfgUrl" placeholder="https://xxxx.supabase.co">
    <label>Anon Public Key</label>
    <input id="cfgKey" placeholder="eyJhbGciOi...">
    <button class="btn btn-outline" style="width:auto;" onclick="saveConfig()">Simpan</button>
    <span id="cfgStatus" style="margin-left:8px;"></span>
  </details>
</div>

<div class="layout">

  <!-- PANEL TENGAH: CART -->
  <div class="panel">
    <h2>Cart / Daftar Item</h2>

    <label>Paste Teks dari POS (opsional)</label>
    <textarea id="posPasteArea" rows="3"
      placeholder="1 unit RTX 5070 (1 x @12.000.000 = Rp 12.000.000)"
      style="width:100%;background:#0f1117;border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:12px;padding:8px;margin-bottom:6px;resize:vertical;"></textarea>
    <div style="display:flex; gap:8px; margin-bottom:6px;">
      <button class="btn btn-outline" style="width:auto;flex:1;margin:0;" onclick="parsePosPaste()">📋 Parse &amp; Tambah ke Cart</button>
      <button class="btn btn-outline" style="width:auto;margin:0;" onclick="clearPosPaste()">Bersihkan</button>
    </div>
    <div id="posPasteStatus" style="font-size:12px; margin-bottom:14px; min-height:14px;"></div>

    <table id="cartTable">
      <thead>
        <tr><th>Nama Item</th><th>Qty</th><th>Harga Satuan</th><th></th></tr>
      </thead>
      <tbody id="cartBody"></tbody>
    </table>
    <button class="add-btn" onclick="addItem()">+ Tambah Item</button>

    <div class="totals">
      <div class="line"><span>Subtotal</span><span id="tSub">Rp 0</span></div>
      <div class="line"><span>Diskon</span>
        <span style="display:flex;align-items:center;gap:6px;">
          <input id="discount" type="number" value="0" min="0"
            style="width:130px;margin:0;padding:4px 6px;font-size:12px;"
            oninput="renderCart()">
        </span>
      </div>
      <div class="line grand"><span>Grand Total</span><span id="tGrand">Rp 0</span></div>
    </div>
  </div>

  <!-- PANEL KANAN: DOKUMEN -->
  <div class="panel">
    <h2>Info Dokumen</h2>

    <label>Jenis Dokumen</label>
    <select id="docType" onchange="previewNumber()">
      <option value="Penawaran Harga">Penawaran Harga (EK-PH)</option>
      <option value="Proforma Invoice">Proforma Invoice (EK-PI)</option>
    </select>

    <div class="row2">
      <div>
        <label>No. Dokumen (preview)</label>
        <input id="docNum" readonly>
      </div>
      <div>
        <label>Tanggal</label>
        <input id="docDate" type="text" placeholder="dd-mm-yyyy">
      </div>
    </div>

    <label>Nama Customer / Perusahaan</label>
    <input id="custName" placeholder="PT Contoh Jaya">

    <div class="row2">
      <div>
        <label>No. Telepon</label>
        <input id="custPhone" placeholder="08xx...">
      </div>
      <div>
        <label>Email</label>
        <input id="custEmail" placeholder="opsional">
      </div>
    </div>

    <div style="margin-top:16px;">
      <button class="btn btn-green" id="btnPdf" onclick="generatePDF()">📄 Generate PDF</button>
      <button class="btn btn-outline" id="btnDocx" onclick="generateDOCX()">📝 Generate DOCX</button>
    </div>

    <div id="status"></div>
  </div>
</div>

<!-- MODAL HISTORY -->
<div id="historyModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,.65); z-index:50; align-items:center; justify-content:center;">
  <div style="background:var(--panel); border:1px solid var(--border); border-radius:10px; width:92%; max-width:720px; max-height:82vh; display:flex; flex-direction:column; padding:18px;">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
      <h2 style="margin:0; font-size:16px;">History Quotation</h2>
      <button onclick="closeHistory()" style="background:none;border:none;color:var(--tdim);font-size:20px;cursor:pointer;">✕</button>
    </div>
    <input id="historySearch" placeholder="Cari nomor, nama customer, tanggal..." oninput="renderHistoryList()">
    <div id="historyList" style="overflow-y:auto; flex:1; margin-top:4px;"></div>
  </div>
</div>

/* ===============================================================
   UTIL
=============================================================== */
function fmtRp(n){
  n = Math.round(n || 0);
  return "Rp " + n.toLocaleString("id-ID");
}
function todayStr(){
  const d = new Date();
  const p = (x)=>String(x).padStart(2,"0");
  return `${p(d.getDate())}-${p(d.getMonth()+1)}-${d.getFullYear()}`;
}
function ymNow(){
  const d = new Date();
  return `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,"0")}`;
}
function dataUriToUint8Array(dataUri){
  const base64 = dataUri.split(",")[1];
  const binary = atob(base64);
  const bytes = new Uint8Array(binary.length);
  for(let i=0;i<binary.length;i++) bytes[i] = binary.charCodeAt(i);
  return bytes;
}

/* ===============================================================
   CART
=============================================================== */
function addItem(){
  itemSeq++;
  cartItems.push({ id: itemSeq, name: "", qty: 1, price: 0 });
  renderCart();
}
function removeItem(id){
  cartItems = cartItems.filter(i => i.id !== id);
  renderCart();
}
function updateItem(id, field, value){
  const it = cartItems.find(i => i.id === id);
  if(!it) return;
  if(field === "qty" || field === "price") it[field] = Number(value) || 0;
  else it[field] = value;
  renderCart(true); // skip full re-render focus loss on totals-only fields is fine, but keep simple
}
function renderCart(skipRebuildInputs){
  const body = document.getElementById("cartBody");
  if(!skipRebuildInputs){
    body.innerHTML = "";
    cartItems.forEach(it => {
      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td><input value="${escapeHtml(it.name)}" oninput="updateItem(${it.id},'name',this.value)" placeholder="Nama produk"></td>
        <td><input type="number" min="1" value="${it.qty}" oninput="updateItem(${it.id},'qty',this.value)"></td>
        <td><input type="number" min="0" value="${it.price}" oninput="updateItem(${it.id},'price',this.value)"></td>
        <td><button class="del-btn" onclick="removeItem(${it.id})">✕</button></td>
      `;
      body.appendChild(tr);
    });
  }
  const sub = cartItems.reduce((s,i)=> s + (i.qty*i.price), 0);
  const disc = Number(document.getElementById("discount").value) || 0;
  const grand = Math.max(0, sub - disc);
  document.getElementById("tSub").textContent = fmtRp(sub);
  document.getElementById("tGrand").textContent = fmtRp(grand);
}
function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}

/* ===============================================================
   PASTE DARI POS — parser regex (bukan AI), sama seperti versi desktop
   Pola: "1 unit RTX 5070 (1 x @12.000.000 = Rp ...)"
=============================================================== */
const POS_LINE_RE = /(\d+)\s+unit\s+(.*?)\s+\((\d+)\s+x\s+@([\d.]+)/i;

function cleanProductName(name){
  return name.replace(/\[READY\]/ig, "").replace(/\s+/g," ").trim();
}
function parsePosText(rawText){
  const items = [], failed = [];
  rawText.split("\n").forEach(line => {
    line = line.trim();
    if(!line) return;
    const m = POS_LINE_RE.exec(line);
    if(!m){ failed.push(line); return; }
    items.push({
      name: cleanProductName(m[2]),
      qty: parseInt(m[1], 10),
      price: parseInt(m[4].replace(/\./g,""), 10),
    });
  });
  return { items, failed };
}
function parsePosPaste(){
  const raw = document.getElementById("posPasteArea").value;
  const statusEl = document.getElementById("posPasteStatus");
  if(!raw.trim()){
    statusEl.innerHTML = '<span class="warn">Paste teks POS dulu.</span>';
    return;
  }
  const { items, failed } = parsePosText(raw);
  items.forEach(it => {
    itemSeq++;
    cartItems.push({ id: itemSeq, name: it.name, qty: it.qty, price: it.price });
  });
  renderCart();
  if(items.length === 0){
    statusEl.innerHTML = `<span class="err">Tidak ada baris yang cocok pola POS. ${failed.length} baris gagal.</span>`;
    return;
  }
  let msg = `✅ ${items.length} item ditambahkan ke cart.`;
  let cls = "ok";
  if(failed.length){ msg += ` ${failed.length} baris tidak terbaca (dilewati).`; cls = "warn"; }
  statusEl.innerHTML = `<span class="${cls}">${msg}</span>`;
}
function clearPosPaste(){
  document.getElementById("posPasteArea").value = "";
  document.getElementById("posPasteStatus").textContent = "";
}

/* ===============================================================
   NOMOR DOKUMEN (via Supabase counter, per prefix+bulan)
=============================================================== */
async function peekNextNumber(prefix){
  if(!sb) return `${prefix}-${ymNow()}-????`;
  const key = `${prefix}_${ymNow()}`;
  const { data } = await sb.from("quotation_counters").select("count").eq("key", key).maybeSingle();
  const next = (data?.count || 0) + 1;
  return `${prefix}-${ymNow()}-${String(next).padStart(4,"0")}`;
}
async function getNextNumber(prefix){
  const key = `${prefix}_${ymNow()}`;
  const { data } = await sb.from("quotation_counters").select("count").eq("key", key).maybeSingle();
  const next = (data?.count || 0) + 1;
  await sb.from("quotation_counters").upsert({ key, count: next });
  return `${prefix}-${ymNow()}-${String(next).padStart(4,"0")}`;
}
async function resolveDocNumber(prefix){
  // Kalau field nomor sudah diisi manual/dari history (beda dari next-peek),
  // pakai ulang nomor itu (nggak increment counter) — sama seperti versi desktop.
  const current = document.getElementById("docNum").value.trim();
  const peek = await peekNextNumber(prefix);
  if(!current || current === peek){
    return await getNextNumber(prefix);
  }
  return current;
}
async function previewNumber(){
  const docKey = document.getElementById("docType").value;
  const prefix = DOC_TYPES[docKey].prefix;
  document.getElementById("docNum").value = await peekNextNumber(prefix);
}

        rows: [ headerRow, ...itemRows, ...totalRows ] }),
      new Paragraph({ text:"" }),
      new Paragraph({ text:"Pembayaran dapat ditransfer ke:" }),
      new Paragraph({ children:[ new TextRun({ text:"Bank BCA   ", bold:true }),
        new TextRun({ text:"693-0310-105  a/n  CV TEMAN BAIK", bold:true, color:"1a7a2e" }) ] }),
      new Paragraph({ children:[ new TextRun({ text:"Bank Mandiri   ", bold:true }),
        new TextRun({ text:"1200012717422  a/n  CV TEMAN BAIK", bold:true, color:"1a7a2e" }) ] }),
      new Paragraph({ text:"" }),
      new Paragraph({ text:"Demikian penawaran ini kami sampaikan. Harga berlaku pada hari yang sama dengan tanggal quotation." }),
      new Paragraph({ text:"Atas perhatian dan kepercayaan Bapak/Ibu, kami ucapkan terima kasih." }),
      new Paragraph({ text:"" }),
      new Paragraph({ children:[ new ImageRun({ data: dataUriToUint8Array(CAP_IMG), type:"jpg",
        transformation:{ width:130, height:130*(119/207) } }) ] }),
      new Paragraph({ text:"", pageBreakBefore: true }),
      new Paragraph({ alignment: AlignmentType.CENTER,
        children:[ new ImageRun({ data: dataUriToUint8Array(KOP_IMG), type:"png",
          transformation:{ width:550, height:550/4.91 } }) ] }),
      new Paragraph({ text:"" }),
      new Paragraph({ children:[ new TextRun({ text:"Syarat & Ketentuan", bold:true, size:24 }) ] }),
      new Paragraph({ text:"" }),
      ...syaratParas,
    ]}]});

    const blob = await Packer.toBlob(doc);
    const safeName = (customer.name || "customer").replace(/[^\w\-]/g,"_");
    const filePrefix = docKey === "Proforma Invoice" ? "ProformaInvoice" : "Penawaran";
    saveAs(blob, `${filePrefix}_${safeName}_${num}.docx`);

    await saveHistory(num, docKey, customer, cartItems, discount, dateStr);
    setStatus(`✅ DOCX berhasil: ${num}`, "ok");
    await previewNumber();
  }catch(e){
    console.error(e);
    setStatus(`❌ Gagal generate DOCX: ${e.message}`, "err");
  }finally{
    btn.disabled = false; btn.textContent = "📝 Generate DOCX";
  }
}
